<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIAO Project Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #004966;
            min-height: 100vh;
            padding: 24px 20px;
        }
        .container { max-width: 1280px; margin: 0 auto; }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-text h1 {
            font-size: 2rem;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header-text h1 span { color: #8FC31F; }
        .header-text p {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.65);
            margin-top: 4px;
        }
        .lang-btn {
            padding: 7px 18px;
            border: 2px solid rgba(255,255,255,0.4);
            background: transparent;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: border-color 0.2s, background 0.2s;
            white-space: nowrap;
        }
        .lang-btn:hover { border-color: #8FC31F; background: rgba(143,195,31,0.12); }

        /* Filters */
        .filters {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-group label {
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            min-width: 60px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .filter-btn {
            padding: 5px 14px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: rgba(255,255,255,0.75);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.15s;
        }
        .filter-btn:hover {
            border-color: #8FC31F;
            color: #8FC31F;
        }
        .filter-btn.active {
            background: #8FC31F;
            border-color: #8FC31F;
            color: #004966;
            font-weight: 600;
        }

        /* Stats */
        .stats {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            margin-bottom: 12px;
            padding-left: 2px;
        }

        /* Table wrapper for horizontal scroll on mobile */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Projects table */
        .projects-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.04);
        }
        .projects-table thead tr {
            background: rgba(0,0,0,0.25);
        }
        .projects-table thead th {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .projects-table thead th:first-child { width: 44px; text-align: center; }

        /* Data rows */
        .project-row {
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            transition: background 0.15s;
        }
        .project-row:hover { background: rgba(143,195,31,0.07); }
        .project-row.expanded { background: rgba(143,195,31,0.1); }
        .project-row td {
            padding: 13px 16px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.88);
            vertical-align: middle;
        }
        .project-row td:first-child {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            font-variant-numeric: tabular-nums;
        }
        .project-name {
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .expand-icon {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .project-row.expanded .expand-icon { transform: rotate(90deg); color: #8FC31F; }

        /* Tags */
        .tag {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .tag-board    { background: rgba(0,73,102,0.6);   color: #7dd3f0; border: 1px solid rgba(125,211,240,0.2); }
        .tag-category { background: rgba(143,195,31,0.15); color: #b8e05a; border: 1px solid rgba(143,195,31,0.25); }
        .tag-official { background: rgba(255,200,50,0.12); color: #fcd34d; border: 1px solid rgba(252,211,77,0.2); }
        .tag-community{ background: rgba(143,195,31,0.1);  color: #a3d43f; border: 1px solid rgba(143,195,31,0.2); }

        /* Detail rows */
        .detail-row { display: none; }
        .detail-row.open { display: table-row; }
        .detail-cell {
            padding: 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .detail-inner {
            padding: 18px 56px 20px 56px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(143,195,31,0.2);
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        .detail-preview {
            flex-shrink: 0;
            width: 260px;
            max-width: 260px;
        }
        .detail-preview img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            display: block;
        }
        .detail-body { flex: 1; min-width: 0; }
        .detail-description {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            line-height: 1.65;
            margin-bottom: 16px;
        }
        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            background: #8FC31F;
            color: #004966;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background 0.15s, transform 0.1s;
        }
        .project-link:hover { background: #a0d422; transform: translateY(-1px); }

        @media (max-width: 720px) {
            .detail-inner { flex-direction: column; }
            .detail-preview { width: 100%; max-width: 100%; }
            .detail-preview img { height: 180px; }
        }

        /* No results */
        .no-results {
            text-align: center;
            color: rgba(255,255,255,0.45);
            padding: 60px 20px;
            font-size: 1rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.35);
            margin-top: 32px;
            font-size: 0.82rem;
        }
        .footer a { color: rgba(143,195,31,0.8); text-decoration: none; }
        .footer a:hover { color: #8FC31F; }

        @media (max-width: 640px) {
            .header-text h1 { font-size: 1.5rem; }
            .detail-inner { padding: 14px 16px; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-text">
                <h1 id="title">XIAO <span>Project Hub</span></h1>
                <p id="subtitle">Discover what you can build with XIAO</p>
            </div>
            <button class="lang-btn" id="langBtn" onclick="toggleLang()">中文</button>
        </header>

        <div class="filters">
            <div class="filter-group" id="year-filters">
                <label id="label-year">Year</label>
                <button class="filter-btn active" data-filter="year" data-value="" id="btn-all-year">All</button>
            </div>
            <div class="filter-group" id="type-filters">
                <label id="label-type">Source</label>
                <button class="filter-btn active" data-filter="author_type" data-value="" id="btn-all-type">All</button>
            </div>
            <div class="filter-group" id="board-filters">
                <label id="label-board">Board</label>
                <button class="filter-btn active" data-filter="board" data-value="" id="btn-all-board">All</button>
            </div>
            <div class="filter-group" id="category-filters">
                <label id="label-category">Category</label>
                <button class="filter-btn active" data-filter="category" data-value="" id="btn-all-cat">All</button>
            </div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="table-wrapper" id="table-wrapper">
            <table class="projects-table" id="projects-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th id="th-name">Project</th>
                        <th id="th-board">Board</th>
                        <th id="th-category">Category</th>
                        <th id="th-source">Source</th>
                        <th id="th-year">Year</th>
                        <th id="th-author">Author</th>
                    </tr>
                </thead>
                <tbody id="projects"></tbody>
            </table>
            <div class="no-results" id="no-results" style="display:none;"></div>
        </div>

        <div class="footer">
            <p id="footer-text">Data source: <a href="https://github.com/Seeed-Studio/OSHW-XIAO-Series/blob/main/projects.yaml" target="_blank">projects.yaml</a> | Contributions welcome!</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script>
        const YAML_URLS = [
            '../projects.yaml',
            'https://raw.githubusercontent.com/limengdu/OSHW-XIAO-Series/main/projects.yaml'
        ];

        const LANG = {
            en: {
                title: ['XIAO ', 'Project Hub'],
                subtitle: 'Discover what you can build with XIAO',
                labelYear: 'Year', labelType: 'Source', labelBoard: 'Board', labelCategory: 'Category',
                btnAll: 'All', btnOfficial: 'Official', btnCommunity: 'Community',
                thName: 'Project', thBoard: 'Board', thCategory: 'Category',
                thSource: 'Source', thYear: 'Year', thAuthor: 'Author',
                stats: n => `${n} project${n !== 1 ? 's' : ''}`,
                loading: 'Loading projects...',
                loadError: 'Failed to load projects.yaml.',
                noResults: 'No matching projects found.',
                viewProject: 'View Project →',
                footer: 'Data source: <a href="https://github.com/limengdu/OSHW-XIAO-Series/blob/main/projects.yaml" target="_blank">projects.yaml</a> | Contributions welcome!',
                langBtn: '中文'
            },
            zh: {
                title: ['XIAO ', '项目中心'],
                subtitle: '探索用 XIAO 能做的精彩项目',
                labelYear: '年份', labelType: '来源', labelBoard: '型号', labelCategory: '场景',
                btnAll: '全部', btnOfficial: '官方', btnCommunity: '社区',
                thName: '项目名称', thBoard: '开发板', thCategory: '分类',
                thSource: '来源', thYear: '年份', thAuthor: '作者',
                stats: n => `共 ${n} 个项目`,
                loading: '正在加载项目数据...',
                loadError: '无法加载 projects.yaml。',
                noResults: '没有找到匹配的项目。',
                viewProject: '查看项目 →',
                footer: '数据来源：<a href="https://github.com/limengdu/OSHW-XIAO-Series/blob/main/projects.yaml" target="_blank">projects.yaml</a> | 欢迎贡献项目！',
                langBtn: 'English'
            }
        };

        let PROJECTS_DATA = [];
        let currentLang = 'en';
        let activeFilters = { year: '', author_type: '', board: '', category: '' };
        let openRowIndex = -1;

        function t(obj) { return typeof obj === 'string' ? obj : (obj[currentLang] || obj.en); }

        // Returns true if the project has content in the given language.
        // A plain string value (not {en/zh}) is treated as language-agnostic.
        function hasLang(p, lang) {
            if (typeof p.name === 'string') return true;
            return !!(p.name && p.name[lang]);
        }

        function getPreviewImage(p) {
            let url = p.image || null;
            if (!url) {
                const ytMatch = p.link && p.link.match(/youtube\.com\/watch\?v=([\w-]+)/);
                if (ytMatch) return `https://img.youtube.com/vi/${ytMatch[1]}/hqdefault.jpg`;
                return null;
            }
            // Convert GitHub blob URL to raw URL for direct image display
            // e.g. https://github.com/user/repo/blob/main/path/img.jpg
            //   -> https://raw.githubusercontent.com/user/repo/main/path/img.jpg
            url = url.replace(
                /^https:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/(.+)$/,
                'https://raw.githubusercontent.com/$1/$2/$3'
            );
            return url;
        }

        async function loadYaml() {
            for (const url of YAML_URLS) {
                try {
                    const res = await fetch(url);
                    if (!res.ok) continue;
                    const text = await res.text();
                    const data = jsyaml.load(text);
                    if (data && data.projects) return data.projects;
                } catch (e) {
                    continue;
                }
            }
            return null;
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            openRowIndex = -1;
            updateLang();
            initFilters();
            renderProjects();
        }

        function updateLang() {
            const L = LANG[currentLang];
            const titleEl = document.getElementById('title');
            titleEl.innerHTML = L.title[0] + '<span>' + L.title[1] + '</span>';
            document.getElementById('subtitle').textContent = L.subtitle;
            document.getElementById('label-year').textContent = L.labelYear;
            document.getElementById('label-type').textContent = L.labelType;
            document.getElementById('label-board').textContent = L.labelBoard;
            document.getElementById('label-category').textContent = L.labelCategory;
            document.getElementById('btn-all-year').textContent = L.btnAll;
            document.getElementById('btn-all-type').textContent = L.btnAll;
            document.getElementById('btn-all-board').textContent = L.btnAll;
            document.getElementById('btn-all-cat').textContent = L.btnAll;
            document.getElementById('no-results').textContent = L.noResults;
            document.getElementById('footer-text').innerHTML = L.footer;
            document.getElementById('langBtn').textContent = L.langBtn;
            document.getElementById('th-name').textContent = L.thName;
            document.getElementById('th-board').textContent = L.thBoard;
            document.getElementById('th-category').textContent = L.thCategory;
            document.getElementById('th-source').textContent = L.thSource;
            document.getElementById('th-year').textContent = L.thYear;
            document.getElementById('th-author').textContent = L.thAuthor;
        }

        function initFilters() {
            const langProjects = PROJECTS_DATA.filter(p => hasLang(p, currentLang));
            const years = [...new Set(langProjects.map(p => p.year))].sort((a, b) => b - a);
            const boards = [...new Set(langProjects.map(p => p.board))].sort();
            const categories = [...new Set(langProjects.map(p => t(p.category)))].sort();
            const L = LANG[currentLang];

            document.querySelectorAll('.filter-btn:not([id])').forEach(btn => btn.remove());

            years.forEach(year => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = 'year';
                btn.dataset.value = year;
                btn.textContent = year;
                document.getElementById('year-filters').appendChild(btn);
            });

            const typeContainer = document.getElementById('type-filters');
            [['Official', L.btnOfficial], ['Community', L.btnCommunity]].forEach(([val, label]) => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = 'author_type';
                btn.dataset.value = val;
                btn.textContent = label;
                typeContainer.appendChild(btn);
            });

            boards.forEach(board => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = 'board';
                btn.dataset.value = board;
                btn.textContent = board;
                document.getElementById('board-filters').appendChild(btn);
            });

            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = 'category';
                btn.dataset.value = category;
                btn.textContent = category;
                document.getElementById('category-filters').appendChild(btn);
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                const active = activeFilters[btn.dataset.filter];
                if (btn.dataset.value === String(active)) btn.classList.add('active');
                btn.addEventListener('click', () => {
                    const filterType = btn.dataset.filter;
                    document.querySelectorAll(`.filter-btn[data-filter="${filterType}"]`).forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeFilters[filterType] = btn.dataset.value;
                    openRowIndex = -1;
                    renderProjects();
                });
            });
        }

        function renderProjects() {
            const tbody = document.getElementById('projects');
            const noResults = document.getElementById('no-results');
            const stats = document.getElementById('stats');
            const tableWrapper = document.getElementById('table-wrapper');
            const L = LANG[currentLang];

            const filtered = PROJECTS_DATA.filter(p => {
                if (!hasLang(p, currentLang)) return false;
                if (activeFilters.year && p.year != activeFilters.year) return false;
                if (activeFilters.author_type && p.author_type !== activeFilters.author_type) return false;
                if (activeFilters.board && p.board !== activeFilters.board) return false;
                if (activeFilters.category && t(p.category) !== activeFilters.category) return false;
                return true;
            });

            stats.textContent = L.stats(filtered.length);

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                noResults.style.display = 'block';
                tableWrapper.querySelector('table').style.display = 'none';
                return;
            }

            noResults.style.display = 'none';
            tableWrapper.querySelector('table').style.display = '';

            tbody.innerHTML = filtered.map((p, i) => {
                const isOfficial = p.author_type === 'Official';
                const sourceTag = `<span class="tag ${isOfficial ? 'tag-official' : 'tag-community'}">${isOfficial ? L.btnOfficial : L.btnCommunity}</span>`;
                const img = getPreviewImage(p);
                const imgHtml = img ? `<div class="detail-preview"><img src="${img}" alt="${t(p.name)}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` : '';
                return `
                <tr class="project-row" data-idx="${i}" onclick="toggleDetail(${i}, this)">
                    <td>${i + 1}</td>
                    <td><span class="project-name"><span class="expand-icon">&#9658;</span>${t(p.name)}</span></td>
                    <td><span class="tag tag-board">${p.board}</span></td>
                    <td><span class="tag tag-category">${t(p.category)}</span></td>
                    <td>${sourceTag}</td>
                    <td>${p.year}</td>
                    <td>${t(p.author)}</td>
                </tr>
                <tr class="detail-row" id="detail-${i}">
                    <td class="detail-cell" colspan="7">
                        <div class="detail-inner">
                            ${imgHtml}
                            <div class="detail-body">
                                <p class="detail-description">${t(p.description)}</p>
                                <a href="${p.link}" target="_blank" class="project-link" onclick="event.stopPropagation()">${L.viewProject}</a>
                            </div>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function toggleDetail(idx, row) {
            const detailRow = document.getElementById('detail-' + idx);
            const isOpen = detailRow.classList.contains('open');

            document.querySelectorAll('.detail-row.open').forEach(r => r.classList.remove('open'));
            document.querySelectorAll('.project-row.expanded').forEach(r => r.classList.remove('expanded'));

            if (!isOpen) {
                detailRow.classList.add('open');
                row.classList.add('expanded');
                openRowIndex = idx;
            } else {
                openRowIndex = -1;
            }
        }

        (async () => {
            updateLang();
            document.getElementById('stats').textContent = LANG[currentLang].loading;

            const projects = await loadYaml();
            if (!projects) {
                document.getElementById('stats').textContent = LANG[currentLang].loadError;
                return;
            }
            PROJECTS_DATA = projects;
            initFilters();
            renderProjects();
        })();
    </script>
</body>
</html>
