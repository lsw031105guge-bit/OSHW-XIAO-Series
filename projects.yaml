- name:
    en: "Veltoc Model 01 — Retro E-Ink Environmental Monitor"
    zh: "Veltoc Model 01 — 复古 E-Ink 环境监测器"
  description:
    en: "A retro-inspired environmental monitor with a 2.9\" E-Ink display, built around the XIAO ESP32-C6. Monitors temperature, humidity, and air pressure via a BME280 sensor with WiFi time sync. Features a rotary encoder for navigating views, deep sleep wake-on-press, and a 1400mAh LiPo battery for extended use. The ePaper Driver Board for XIAO handles display control."
    zh: "一款复古风格的环境监测器，配备 2.9\" E-Ink 显示屏，基于 XIAO ESP32-C6 构建。通过 BME280 传感器监测温度、湿度和气压，支持 WiFi 时间同步。具有旋转编码器导航、按压唤醒深度睡眠、1400mAh 锂电池等特性。使用 ePaper Driver Board for XIAO 驱动屏幕。"
