- name:
    en: "Giant XIAO — 15x Scale Fully Functional XIAO ESP32-C3 Replica"
    zh: "巨型 XIAO — 15 倍大全功能 XIAO ESP32-C3 复制品"
  description:
    en: "A fully functional 15× scale replica of the Seeed Studio XIAO ESP32-C3, built with 3D-printed PLA and copper tape wiring. Every pin is wired through to a real XIAO hidden inside the giant USB-C port, making the giant board electrically functional. Features swappable chip housing and magnetic interior tray. Created by the TinyGo team and presented at GopherCon EU 2026."
    zh: "3D 打印的全功能 15 倍大 XIAO ESP32-C3 复制品。每个引脚通过铜箔胶带连接到藏在巨型 USB-C 接口内的真实 XIAO，使巨型开发板具备完整电气功能。配备可更换芯片外壳和磁吸内部收纳托盘。由 TinyGo 团队制作，在 GopherCon EU 2026 展示。"
