- name:
    en: "Little Ledger - Real-Time Blockchain Monitoring"
    zh: "小账本 — 实时区块链监控器"
  description:
    en: "An open-source IoT blockchain monitoring device built around the XIAO ESP32-S3. Connects via WiFi and WebSocket to the XRP Ledger and Xahau networks, displaying real-time transactions, price changes, and network status on a 0.96\" OLED with haptic, audio, and visual alerts. Designed as an educational project to teach C++ through hands-on blockchain data interaction."
    zh: "基于 XIAO ESP32-S3 的开源 IoT 区块链监控装置。通过 WiFi 和 WebSocket 连接 XRP Ledger 及 Xahau 网络，在 0.96\" OLED 上实时显示交易、价格变化和网络状态，并提供震动、声音和视觉警报。以教育为目的，通过实际区块链数据互动来学习 C++ 编程。"
