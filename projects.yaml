- name:
    en: "XIAO ESP32-S3 Sense Retro Camera"
    zh: "XIAO ESP32-S3 Sense 复古相机"
  description:
    en: "A compact retro-styled digital camera built on the Seeed Studio XIAO ESP32-S3 Sense. Captures 1280×720 photos and MJPEG/PCM audio video with a 2.0\" TFT live viewfinder. Features encoder-driven menu, on-device gallery with thumbnail previews, self-timer, timelapse, slideshow, and a tabbed WiFi file server with QR code pairing. Built on FreeRTOS multi-core architecture."
    zh: "基于 Seeed Studio XIAO ESP32-S3 Sense 的紧凑型复古风格数码相机。可拍摄 1280×720 照片和 MJPEG/PCM 音视频，配备 2.0\" TFT 实时取景器。支持编码器菜单系统、设备内图库缩略图预览、自拍定时、延时摄影、幻灯片播放，以及带二维码配对的 WiFi 文件管理。采用 FreeRTOS 多核架构。"
