- name:
    en: "WeatherPaper V2 — 500-Day Battery E-Paper Weather Display"
    zh: "WeatherPaper V2 — 500 天续航电子墨水屏天气显示"
  description:
    en: "An ultra-low-power e-paper weather display engineered for up to 500 days of battery life on a single charge. Built around the XIAO ESP32-C3 with custom PCB (EasyEDA) and 3D-printed resin enclosure. Features deep sleep optimization (44µA), downclocking to 80MHz, WiFiManager captive portal with QR pairing, and OpenWeatherMap integration."
    zh: "一款超低功耗电子墨水屏天气显示器，单次充电续航长达 500 天。基于 XIAO ESP32-C3 构建，配以 EasyEDA 定制 PCB 和 3D 打印树脂外壳。采用深度睡眠优化（44µA）、CPU 降频至 80MHz、WiFiManager 二维码配对和 OpenWeatherMap 数据集成。"
