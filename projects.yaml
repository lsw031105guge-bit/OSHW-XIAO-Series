- name:
    en: "Modular Wearable Platform — Stackable Electronics with XIAO nRF52840"
    zh: "模块化可穿戴平台 — 基于 XIAO nRF52840 的堆叠式电子系统"
  description:
    en: "A modular wearable development platform built around the Seeed Studio XIAO nRF52840, where each function lives on its own stackable module. Features heart rate monitoring via MAX30101, step counting via MPU6050 IMU, OLED display output, and Bluetooth BLE data transmission. An early prototype demonstrating a flexible approach to wearable system design."
    zh: "基于 Seeed Studio XIAO nRF52840 的模块化可穿戴开发平台，每个功能独立为可堆叠模块。集成 MAX30101 心率监测、MPU6050 计步、OLED 显示和 BLE 数据传输。早期原型，展示灵活的可穿戴系统设计方法。"
