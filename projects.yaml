- name:
    en: "Sleeper Matter Sensor — Ultra-Low-Power XIAO nRF52840 Smart Home Sensor"
    zh: "超低功耗 Matter 智能家居传感器 — 基于 XIAO nRF52840"
  description:
    en: "An ultra-low-power Matter smart home sensor built around the Seeed Studio XIAO nRF52840, engineered for years of battery life. Features Matter protocol integration for local-only Home Assistant control, SHT41 temperature and humidity sensing, and LiPo fuel gauge. Demonstrates intermittent connectivity strategies for Matter devices with cross-platform power analysis."
    zh: "基于 Seeed Studio XIAO nRF52840 的超低功耗 Matter 智能家居传感器，续航长达数年。支持 Matter 协议本地 Home Assistant 控制，集成 SHT41 温湿度传感器和 LiPo 电量计。展示了 Matter 设备的间歇连接策略和跨平台功耗分析。"
