- name:
    en: "ET MeetingRoom ePaper Sign — SharePoint Room Reservation Display"
    zh: "ET 会议室电子墨水屏标识牌 — SharePoint 会议室预订显示"
  description:
    en: "An integrated ePaper meeting room sign built around the Seeed Studio XIAO ESP32-S3 that bridges a reTerminal E1002 full-color ePaper display with a SharePoint Server 2019 room-booking calendar. The XIAO acts as a lightweight REST API wrapper, caching SharePoint OData results and serving clean JSON to a SenseCraft HMI-powered display. Designed for on-premises deployment with no cloud dependency and military-grade security."
    zh: "基于 Seeed Studio XIAO ESP32-S3 的集成式会议室电子墨水屏标识牌，连接 reTerminal E1002 彩色电子纸显示屏与 SharePoint Server 2019 会议室预订日历。XIAO 作为轻量 REST API 包装器，缓存 SharePoint OData 结果并输出干净 JSON 给 SenseCraft HMI 界面。纯本地部署，无云端依赖，达到军事级安全标准。"
