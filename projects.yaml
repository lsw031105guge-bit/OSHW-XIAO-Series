- name:
    en: "Corporate Slave Digital Phone DP192 — Reviving a 1996 Phone with ESP32"
    zh: "社畜数字电话 DP192 — 用 ESP32 复活 1996 年手机"
  description:
    en: "A creative revival of a 1996 Good Design Award-winning digital mobile phone (Nippondenso DP192) using Seeed Studio XIAO ESP32-C3. The phone checks a designated email inbox every 5 minutes and alerts via OLED display and buzzer when matching keywords are found. Part of the 'Corporate Slave Warning Light' series for system fault monitoring, with open source Arduino code available on GitHub."
    zh: "用 Seeed Studio XIAO ESP32-C3 复活 1996 年 Good Design Award 获奖数字手机 DP192。每 5 分钟检查指定邮箱，收到含关键字的邮件时通过 OLED 显示屏和蜂鸣器发出警报。属于\"社畜警示灯\"系列——用于系统故障监控的开源 Arduino 项目。"
