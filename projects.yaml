- name:
    en: "NIMO — ESP32 Desk Buddy Robot with Motion Sensing & Emotions"
    zh: "NIMO — ESP32 桌面伙伴机器人（运动感应 & 表情交互）"
  description:
    en: "A DIY ESP32 desk buddy robot with animated OLED eyes and MPU6050 motion sensing. Built around the XIAO ESP32-C3, features shake-to-emotion reactions (Dizzy → Angry), live weather mood with 3-day forecast, RTC, world clock, and touch navigation. Fully 3D-printed enclosure with open-source code and STL files."
    zh: "DIY ESP32 桌面伙伴机器人，配备动画 OLED 眼睛和 MPU6050 运动感应。基于 XIAO ESP32-C3，支持摇晃触发表情反应（晕眩→生气）、实时天气情绪（含 3 天预报）、RTC、世界时钟和触摸导航。全 3D 打印外壳，开源代码和 STL 文件。"
