- name:
    en: "LUN-E Explorer"
    zh: "LUN-E 月球桌面探测车"
  description:
    en: "A desk companion rover built on the XIAO ESP32-S3 Sense that uses browser-based computer vision for autonomous navigation. The ESP32 streams MJPEG frames from its OV2640 camera to a browser where JavaScript processes pixel data to classify floor, detect cliffs, and control two continuous-rotation servos via WebSocket at 40 Hz. Features include floor learning on boot, a multi-state FSM (LEARN → SCAN → FWD → AVOID → REV → CLIFF), live parameter tuning, and occupancy grid mapping."
    zh: "基于 XIAO ESP32-S3 Sense 的桌面探测车，利用浏览器端计算机视觉实现自主导航。ESP32 将 OV2640 摄像头的 MJPEG 画面推流到浏览器，通过 JavaScript 分析像素来判断地面/悬崖，并通过 WebSocket 以 40Hz 控制两个连续旋转舵机。支持开机地面学习、多状态 FSM（学习→扫描→前进→规避→后退→悬崖）、实时参数调节滑块和占据栅格地图。"
  board: "XIAO ESP32-S3 Sense"
  category:
    en: "Robotics"
    zh: "机器人"
  year: 2026
  month: 5
  author:
    en: "Absurd Industries"
    zh: "Absurd Industries"
  author_type: "GitHub"
  link: "https://github.com/Absurd-Industries/lune-rover"
  image: ""

- name:
    en: "ESP32-C5 Piglet Build — From PCB to Working Wardriver"
    zh: "ESP32-C5 Piglet 组装教程 — 从 PCB 到可运行的 Wardriver"
  description:
    en: "A step-by-step build tutorial for the open-source Piglet Wi-Fi wardriver based on the XIAO ESP32-C5. Walks through PCB assembly from Seeed Studio custom boards, SD card module wiring with correct pinouts, and firmware flashing using Espressif Flash Tool. Covers common soldering pitfalls and awareness to ensure a successful first boot."
    zh: "开源 Piglet Wi-Fi wardriver 的逐步组装教程，基于 XIAO ESP32-C5。涵盖 Seeed Studio 定制 PCB 组装、SD 卡模块接线、使用 Espressif Flash Tool 刷写固件，以及常见焊接陷阱和引脚注意事项。"
  board: "XIAO ESP32-C5"
